<!DOCTYPE html>
<html>
<head>
    <title>
        Hansel Israel Castro Flores - Ejercicio 8 
    </title>
</head>
<body>
    <h2>Encuentas</h2>
    <form>
        <p>Cual es tu instrumento preferido </p>

        <input type="radio" id="guitarra" name="favorito" value="guitarra">
        <label for="guitarra">Guitarra</label>
        <input type="radio" id="piano" name="favorito" value="piano">
        <label for="piano">Piano</label>
        <input type="radio" id="bateria" name="favorito" value="bateria">
        <label for="bateria">Bateria</label>
        <input type="radio" id="violin" name="favorito" value="violin">
        <label for="violin">Violin</label>
        <input type="radio" id="bajo" name="favorito" value="bajo">
        <label for="bajo">Bajo Electrico</label>
        
        <br><hr><br>

        <label for="categoria">Elige una categoria de instrumentos:</label>
        <select id="categoria" name="categoria">
            <option value="cuerdas">Cuerdas</option>
            <option value="viento">Viento</option>
            <option value="percusion">Percusion</option>
            <option value="electronicos">Electronicos</option>
        </select>

        <br><br>
        <input type="submit" value="Enviar mi seleccion">

    </form>
</body>
</html>
