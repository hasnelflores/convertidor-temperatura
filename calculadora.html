<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Formularios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .formulario-caja { background-color: #f4f4f4; padding: 20px; border-radius: 8px; max-width: 400px; }
        input { margin-bottom: 10px; padding: 5px; width: 90%; }
        button { margin-right: 5px; margin-bottom: 10px; padding: 8px 12px; cursor: pointer; }
        .resultado { font-size: 20px; color: blue; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>Calculadora Interactiva</h1>
    
    <div class="formulario-caja">
        <form id="miFormulario">
            <label for="num1">Ingresa el primer número:</label><br>
            <input type="number" id="num1" placeholder="Ej. 10" required><br>

            <label for="num2">Ingresa el segundo número:</label><br>
            <input type="number" id="num2" placeholder="Ej. 2" required><br>

            <button type="button" onclick="sumar()">Sumar (+)</button>
            <button type="button" onclick="restar()">Restar (-)</button>
            <button type="button" onclick="dividir()">Dividir (/)</button>
            <button type="button" onclick="exponenciar()">Exponenciación (**)</button>
        </form>

        <div class="resultado" id="caja-resultado">Resultado: </div>
    </div>

    <script>
        // Función para obtener los valores de las cajas de texto
        function obtenerNumeros() {
            // Usamos Number() para asegurarnos de que el texto se convierta en matemáticas
            let numero1 = Number(document.getElementById("num1").value);
            let numero2 = Number(document.getElementById("num2").value);
            return { n1: numero1, n2: numero2 };
        }

        // Funciones para cada botón
        function sumar() {
            let valores = obtenerNumeros();
            let resultado = valores.n1 + valores.n2;
            document.getElementById("caja-resultado").innerHTML = "Resultado de la Suma: " + resultado;
        }

        function restar() {
            let valores = obtenerNumeros();
            let resultado = valores.n1 - valores.n2;
            document.getElementById("caja-resultado").innerHTML = "Resultado de la Resta: " + resultado;
        }

        function dividir() {
            let valores = obtenerNumeros();
            if(valores.n2 === 0) {
                document.getElementById("caja-resultado").innerHTML = "Error: No se puede dividir entre cero.";
            } else {
                let resultado = valores.n1 / valores.n2;
                document.getElementById("caja-resultado").innerHTML = "Resultado de la División: " + resultado;
            }
        }

        function exponenciar() {
            let valores = obtenerNumeros();
            let resultado = valores.n1 ** valores.n2;
            document.getElementById("caja-resultado").innerHTML = "Resultado de la Exponenciación: " + resultado;
        }
    </script>
</body>
</html>
