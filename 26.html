<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablas Dinámicas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        input {
            padding: 8px;
            font-size: 16px;
            width: 200px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #1e7e34;
        }

        #contenedor {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .tabla {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin: 10px;
            padding: 10px;
            width: 150px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h1>Generador de Tablas de Multiplicar</h1>

<input type="number" id="numero" placeholder="Ingresa un número positivo">
<br>
<button onclick="generarTablas()">Generar tablas</button>

<div id="contenedor"></div>

<script>
    function generarTablas() {
        const num = parseInt(document.getElementById("numero").value);
        const contenedor = document.getElementById("contenedor");

        contenedor.innerHTML = "";

        // Validación
        if (isNaN(num) || num <= 0) {
            alert("Por favor ingresa un número entero positivo");
            return;
        }

        // Ciclo para generar tablas
        for (let i = 1; i <= num; i++) {
            let tablaDiv = document.createElement("div");
            tablaDiv.classList.add("tabla");

            let contenido = "<h3>Tabla del " + i + "</h3>";

            // Ciclo interno para multiplicaciones
            for (let j = 1; j <= 10; j++) {
                contenido += i + " x " + j + " = " + (i * j) + "<br>";
            }

            tablaDiv.innerHTML = contenido;
            contenedor.appendChild(tablaDiv);
        }
    }
</script>

</body>
</html>
